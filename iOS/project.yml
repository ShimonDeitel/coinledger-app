name: Coinledger
options:
  bundleIdPrefix: com.shimondeitel.coinledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coinledger:
    type: application
    platform: iOS
    sources:
      - path: Coinledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coinledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coinledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CoinledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoinledgerTests
      - path: Coinledger.storekit
    dependencies:
      - target: Coinledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coinledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CoinledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CoinledgerUITests
    dependencies:
      - target: Coinledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coinledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coinledger:
    build:
      targets:
        Coinledger: all
        CoinledgerTests: [test]
        CoinledgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coinledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Coinledger.storekit
      targets:
        - CoinledgerTests
        - CoinledgerUITests
    archive:
      config: Release
